spring:
  application:
    name: gestion-escolar
  datasource:
    url: jdbc:postgresql://localhost:5433/gestion_escolar
    username: gestion_user
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.colegio.gestion: DEBUG
